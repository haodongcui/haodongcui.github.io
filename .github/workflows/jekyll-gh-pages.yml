name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'  # 使用与 GitHub Pages 兼容的 Ruby 版本
          bundler-cache: true
          
      - name: Setup Pages
        uses: actions/configure-pages@v3
        with:
          # 明确指定 Jekyll 配置
          jekyll-format: html
          
      - name: Build with Jekyll
        # 使用更稳定的构建方式
        run: |
          gem install jekyll
          jekyll build --baseurl "${{ github.baseurl }}"
        env:
          JEKYLL_ENV: production
          # 强制使用 _config.yml 中的配置
          JEKYLL_FORCE_BUILD: true
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
